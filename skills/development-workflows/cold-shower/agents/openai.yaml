interface:
  display_name: "Cold Shower"
  short_description: "No-flattery adversarial idea review"
  default_prompt: "Use $cold-shower to challenge my proposal before execution or commitment. Do not praise by default or use praise-sandwich wording. Restate the idea, identify hidden assumptions, attack my most confident or weakest claim first, list likely failure modes and missing evidence, then propose the smallest falsification test and kill / revise / continue criteria. Use verified death cases only; otherwise classify failure patterns without inventing facts."
