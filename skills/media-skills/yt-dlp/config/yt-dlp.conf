# yt-dlp 配置文件示例
# 将此文件复制到 ~/.config/yt-dlp/config (Linux/macOS) 或 %APPDATA%\yt-dlp\config.txt (Windows)

# ==================== 基础设置 ====================

# 默认输出目录和文件名格式
# Windows: -o C:/Users/YourName/Downloads/%(title)s.%(ext)s
# macOS/Linux: -o ~/Downloads/%(title)s.%(ext)s
-o ~/Downloads/%(title)s.%(ext)s

# 默认视频格式选择
# 优先选择最佳视频+音频，其次选择最佳单文件
-f bestvideo+bestaudio/best

# ==================== 字幕设置 ====================

# 自动下载字幕
--write-subs

# 字幕语言（逗号分隔）
--sub-langs en,zh,zh-Hans,zh-Hant,en-US

# 嵌入字幕到视频文件
--embed-subs

# 仅下载字幕（不下载视频）
# --skip-download

# ==================== 元数据设置 ====================

# 保存视频信息为 JSON
--write-info-json

# 保存视频描述
--write-description

# 下载并嵌入缩略图
--write-thumbnail
--embed-thumbnail

# ==================== 性能设置 ====================

# 并发片段数（增加可提高速度，但可能被限流）
--concurrent-fragments 4

# 下载速度限制（例如 1M, 500K）
# --limit-rate 2M

# 重试次数
--retries 10
--fragment-retries 10

# ==================== 代理设置 ====================

# HTTP/HTTPS 代理
# --proxy http://127.0.0.1:7890

# SOCKS5 代理
# --proxy socks5://127.0.0.1:1080

# ==================== 播放列表设置 ====================

# 播放列表起始位置
# --playlist-start 1

# 播放列表结束位置
# --playlist-end 10

# 反向播放列表
# --playlist-reverse

# ==================== 高级设置 ====================

# Cookie 文件（用于会员内容）
# --cookies cookies.txt

# 下载存档（避免重复下载）
--download-archive downloaded.txt

# 使用外部下载器（需要 aria2）
# --external-downloader aria2
# --external-downloader-args "-x 8 -k 1M"

# 合并输出格式
--merge-output-format mp4

# 用户代理
# --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
