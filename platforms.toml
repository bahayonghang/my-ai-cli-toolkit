# MyClaude Skills Platform Configuration
# 平台配置文件 - 定义各 AI 编码工具的安装路径和目录结构
#
# 用户可在 ~/.config/myclaude/platforms.toml 创建自定义配置覆盖此文件
# 优先级：用户配置 > 项目配置 > 内置默认配置

[meta]
version = "1.0"
default_platform = "claude"

# ============================================================================
# CLI 类型平台 - 命令行工具
# ============================================================================

[platforms.claude]
type = "cli"
base_dir = "~/.claude"
skills_subdir = "skills"
commands_subdir = "commands"
prompt_file = "CLAUDE.md"
commands_source = "claude"
# fallback_commands_source = null  # 无 fallback

[platforms.codex]
type = "cli"
base_dir = "~/.codex"
skills_subdir = "skills"
commands_subdir = "prompts"  # codex 使用 prompts 目录
# prompt_file = null
commands_source = "codex"
fallback_commands_source = "claude"

[platforms.gemini]
type = "cli"
base_dir = "~/.gemini"
skills_subdir = "skills"
commands_subdir = "commands"
# prompt_file = null
commands_source = "gemini"
# fallback_commands_source = null

[platforms.qwen]
type = "cli"
base_dir = "~/.qwen"
skills_subdir = "skills"
commands_subdir = "commands"
# prompt_file = null
commands_source = "qwen"
fallback_commands_source = "claude"

[platforms.kiro]
type = "cli"
base_dir = "~/.kiro"
skills_subdir = "skills"
commands_subdir = "steering"  # kiro 使用 steering 目录
# prompt_file = null
commands_source = "kiro"
fallback_commands_source = "claude"

[platforms.trae]
type = "cli"
base_dir = "~/.trae"
skills_subdir = "skills"
commands_subdir = "commands"
# prompt_file = null
commands_source = "trae"
fallback_commands_source = "claude"

[platforms.opencode]
type = "cli"
base_dir = "~/.config/opencode"
skills_subdir = "skills"
commands_subdir = "commands"
# prompt_file = null
commands_source = "opencode"
fallback_commands_source = "claude"

[platforms.iflow]
type = "cli"
base_dir = "~/.iflow"
skills_subdir = "skills"
commands_subdir = "commands"
# prompt_file = null  # iFlow uses IFLOW.md but managed by /init command
commands_source = "iflow"
fallback_commands_source = "claude"

# ============================================================================
# App 类型平台 - 桌面/GUI 应用
# ============================================================================

[platforms.antigravity]
type = "app"
base_dir = "~/.gemini/antigravity"  # 嵌套在 gemini 下
skills_subdir = "skills"
commands_subdir = "workflows"  # app 类型使用 workflows
# prompt_file = null
commands_source = "antigravity"
# fallback_commands_source = null

[platforms.windsurf]
type = "app"
base_dir = "~/.codeium/windsurf"  # 嵌套在 codeium 下
skills_subdir = "skills"
commands_subdir = "workflows"
# prompt_file = null
commands_source = "windsurf"
# fallback_commands_source = null

# ============================================================================
# 项目级安装配置 - 安装到特定项目时的目录映射规则
# ============================================================================

[project_install]
# 默认规则：platform_dir = ".{platform}", commands_subdir = "commands"

[project_install.overrides.kiro]
platform_dir = ".kiro"
commands_subdir = "steering"

[project_install.overrides.trae]
platform_dir = ".trae"
commands_subdir = "commands"

[project_install.overrides.antigravity]
platform_dir = ".gemini/antigravity"
commands_subdir = "workflows"

[project_install.overrides.windsurf]
platform_dir = ".codeium/windsurf"
commands_subdir = "workflows"

[project_install.overrides.codex]
platform_dir = ".codex"
commands_subdir = "prompts"

[project_install.overrides.opencode]
platform_dir = ".opencode"
commands_subdir = "commands"

[project_install.overrides.iflow]
platform_dir = ".iflow"
commands_subdir = "commands"
