interface:
  display_name: "Git Commit"
  short_description: "Safely plan, draft, or execute Conventional Commits for staged or all-changes commits, with agent-aware trailers (Agent-Task / Agent-Model / Generated-By), `[AI]` header tag, Why-line enforcement, and a checkpoint mode for long-running tasks"
  default_prompt: "Use $git-commit to inspect the repo changes, decide whether staged-only or all-changes mode applies, split commits safely when needed, then draft or execute a Conventional Commit without pushing. Agent-mode is on by default: inject the `[AI]` header tag, attach `Agent-Task` / `Agent-Model` / `Generated-By` trailers, and enforce a `Why:` body line for feat/fix/refactor/perf. Switch to `chore(wip)` checkpoint mode when the user asks for a WIP / checkpoint commit. Disable agent-mode only when the user explicitly says `no AI tag` or `不要 AI 标记`. Default to English; switch to Chinese only when the user explicitly says `请使用中文拆分提交所有的改动`."
