# External Skills Registry - 外部技能注册表
# 支持通过 npm/npx/pip/git 安装的外部技能
#
# 类型说明:
#   npm-cli  - 全局安装 npm 包后执行 init 命令
#   npx      - 直接通过 npx 执行（无需全局安装）
#   pip-cli  - 全局安装 pip 包后执行命令
#   git      - 克隆 git 仓库后执行安装脚本
#   vercel   - 使用 Vercel Skills CLI (npx skills add)

# ============================================================
# 全局配置
# ============================================================
[config]
# 默认安装方式: "copy" | "symlink"
default_install_method = "symlink"
# 默认安装范围: "global" | "project"
default_scope = "global"
# 是否自动检测已安装的 agents
auto_detect_agents = true
# 支持的所有 agent 平台
known_agents = [
    "amp", "antigravity", "claude", "clawdbot", "cline", "codex", 
    "codebuddy", "copilot", "cursor", "droid", "gemini", "kimi", "kiro",
    "neovate", "opencode", "qoder", "trae", "windsurf"
]

# ============================================================
# UI/UX Pro Max - 设计智能技能
# ============================================================
[skills.ui-ux-pro-max]
description = "UI/UX design intelligence for AI coding assistants"
type = "npm-cli"
package = "uipro-cli"
install_command = "npm install -g uipro-cli"
init_command = "uipro init"
init_args = ["--ai", "{target}"]
# 目标平台映射 (本项目 target -> 外部工具 target)
target_map = { claude = "claude", codex = "codex", gemini = "gemini", windsurf = "windsurf", kiro = "kiro" }
# 支持的所有目标
supported_targets = ["claude", "codex", "cursor", "windsurf", "kiro", "gemini", "copilot", "antigravity", "trae", "opencode", "all"]
requires = ["node"]
homepage = "https://github.com/nextlevelbuilder/ui-ux-pro-max-skill"
license = "MIT"

# ============================================================
# Agent Browser - Vercel Labs 浏览器自动化技能
# ============================================================
[skills.agent-browser]
description = "Browser automation skill from Vercel Labs for AI agents"
type = "vercel"
package = "skills"
repo = "https://github.com/vercel-labs/agent-browser"
skill_name = "agent-browser"
install_method = "symlink"
scope = "global"
supported_targets = ["amp", "antigravity", "claude", "cline", "codex", "cursor", "droid", "gemini", "copilot", "kimi", "kiro", "opencode", "qoder", "trae", "windsurf", "neovate"]
requires = ["node"]
homepage = "https://github.com/vercel-labs/agent-browser"
license = "MIT"

# ============================================================
# planning-with-files - 文件化规划插件（Claude Code）
# ============================================================
[skills.planning-with-files]
description = "File-based planning workflow plugin for Claude Code"
type = "git"
repo = "https://github.com/OthmanAdi/planning-with-files.git"
branch = "master"
dest = ".claude/plugins/planning-with-files"
supported_targets = ["claude"]
requires = ["git"]
homepage = "https://github.com/OthmanAdi/planning-with-files"

# ============================================================
# Remotion Best Practices - Remotion 视频开发最佳实践
# ============================================================
[skills.remotion-best-practices]
description = "Best practices and guidelines for Remotion video development"
type = "vercel"
package = "skills"
repo = "https://github.com/remotion-dev/skills"
skill_name = "remotion-best-practices"
install_method = "symlink"
scope = "global"
supported_targets = ["amp", "antigravity", "claude", "cline", "codex", "cursor", "droid", "gemini", "copilot", "kimi", "kiro", "opencode", "qoder", "trae", "windsurf", "neovate"]
requires = ["node"]
homepage = "https://github.com/remotion-dev/skills"
license = "MIT"

# ============================================================
# Vercel React Best Practices - Vercel Labs React 最佳实践
# ============================================================
[skills.vercel-react-best-practices]
description = "React best practices and guidelines from Vercel Labs for AI agents"
type = "vercel"
package = "skills"
repo = "https://github.com/vercel-labs/agent-skills"
skill_name = "vercel-react-best-practices"
install_method = "symlink"  # symlink | copy
scope = "global"  # global | project
supported_targets = ["amp", "antigravity", "claude", "cline", "codex", "cursor", "droid", "gemini", "copilot", "kimi", "kiro", "opencode", "qoder", "trae", "windsurf", "neovate"]
requires = ["node"]
homepage = "https://github.com/vercel-labs/agent-skills"
license = "MIT"

# ============================================================
# Find Skills - Vercel Labs 技能发现元技能
# ============================================================
[skills.find-skills]
description = "Helps AI agents discover and suggest skills from the ecosystem"
type = "vercel"
package = "skills"
repo = "https://github.com/vercel-labs/skills"
skill_name = "find-skills"
install_method = "symlink"
scope = "global"
supported_targets = ["all"]
requires = ["node"]
homepage = "https://github.com/vercel-labs/skills"
license = "MIT"
recommended = true  # 推荐安装的元技能

