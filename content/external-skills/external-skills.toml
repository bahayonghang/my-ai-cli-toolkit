# 外部技能注册表 — 供 mcs 读取的结构化数据
# 每个 [[skills]] 条目对应一个可通过 npx 安装的外部技能
#
# 字段说明：
#   name        - 技能唯一标识 / 显示名
#   repo        - GitHub 仓库 URL 或 shorthand
#   skill_flag  - --skill 参数（可选，为空时不传）
#   method      - 安装方式：vercel | playbooks
#   category    - 分类标签
#   description - 技能描述
#   stars       - 推荐星级 1-5（可选）
#   project_only - 是否仅支持 project 级别安装（可选，默认 false）
#   usage       - 安装后的使用说明（可选，1-2 句话描述如何触发/使用）

