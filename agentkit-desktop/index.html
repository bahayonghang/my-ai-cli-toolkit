<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/agentkit-favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgentKit Desktop</title>
    <!-- Prevent theme flash: apply theme before any content renders -->
    <script>
      (function() {
        // Check localStorage for cached theme preference
        const cached = localStorage.getItem('agentkit-theme');
        let theme = cached || 'system';

        // Determine if dark mode should be applied
        let isDark = false;
        if (theme === 'dark') {
          isDark = true;
        } else if (theme === 'light') {
          isDark = false;
        } else {
          // System preference
          isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        }

        // Apply dark class immediately
        if (isDark) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <style>
      /* Critical CSS: prevent flash of unstyled content */
      html {
        background-color: #f8fafc;
      }
      html.dark {
        background-color: #11111b;
      }
      /* Smooth theme transition after initial load */
      html.theme-transition,
      html.theme-transition *,
      html.theme-transition *::before,
      html.theme-transition *::after {
        transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease !important;
      }
    </style>
  </head>
  <body class="bg-background-light dark:bg-background-dark">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
