# Claude Code 插件配置文件
# 格式说明:
#   [marketplaces.<name>] - 定义插件市场
#   [plugins.<name>] - 定义插件

# ============================================================
# Marketplaces (插件市场)
# ============================================================

[marketplaces.wshobson-agents]
repo = "wshobson/agents"
description = "Claude Code Workflows & Skills by wshobson"

[marketplaces.claude-canvas]
repo = "dvdsgl/claude-canvas"
description = "Canvas plugin marketplace"

# ============================================================
# Plugins (插件)
# ============================================================

# --- Python 开发 ---
[plugins.python-development]
marketplace = "wshobson-agents"
description = "Python 开发套件 (python-pro, django-pro, fastapi-pro)"
category = "python"

# --- JavaScript/TypeScript ---
[plugins.javascript-typescript]
marketplace = "wshobson-agents"
description = "JS/TS 开发套件 (javascript-pro, typescript-pro)"
category = "javascript"

# --- 代码审查 ---
[plugins.comprehensive-review]
marketplace = "wshobson-agents"
description = "代码审查套件 (architect-review, code-reviewer, security-auditor)"
category = "review"

# --- 基础设施 ---
[plugins.deployment]
marketplace = "wshobson-agents"
description = "部署相关工具"
category = "infrastructure"

[plugins.kubernetes]
marketplace = "wshobson-agents"
description = "Kubernetes 配置工具"
category = "infrastructure"

# --- 安全 ---
[plugins.security-scanning]
marketplace = "wshobson-agents"
description = "安全扫描工具"
category = "security"

# --- Canvas ---
[plugins.canvas]
marketplace = "claude-canvas"
description = "Canvas plugin - 在分屏中生成画布"
category = "tools"
